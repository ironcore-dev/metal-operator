                          type: string
                      required:
                      - fieldPath
                      - value
                      type: object
                    kind:
                      description: Kind of the object whose condition is checked,
                        e.g. "BMCSettings".
                      type: string
                    name:
                      description: |-
                        Name is the exact name of the object to look up.
                        Mutually exclusive with OwnedBy.
                      type: string
                    ownedBy:
                      description: |-
                        OwnedBy resolves the target by finding the child of Kind that is owned
                        by the named Set and associated with this BMC/Server via ownerReferences.
                        Mutually exclusive with Name.
                      properties:
                        kind:
                          description: Kind is the kind of the owning Set CRD, e.g.
