{{- if and .Values.metrics.enable .Values.metrics.secure }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "metal-operator.resourceName" (dict "suffix" "metrics-auth-rolebinding" "context" $) }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "metal-operator.resourceName" (dict "suffix" "metrics-auth-role" "context" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "metal-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
