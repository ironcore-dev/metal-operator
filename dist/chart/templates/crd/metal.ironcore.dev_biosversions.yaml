    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BIOSVersion is the Schema for the biosversions API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BIOSVersionSpec defines the desired state of BIOSVersion.
            properties:
              image:
                description: Image specifies the image to use to upgrade to the given
                  BIOS version.
                properties:
                  URI:
                    description: URI is the URI of the software image to install.
                    type: string
                  secretRef:
                    description: SecretRef is a reference to the Secret containing
                      the credentials to access the image URI.
