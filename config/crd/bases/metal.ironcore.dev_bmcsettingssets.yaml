                          description: APIVersion of the object whose condition is
                            checked, e.g. "metal.ironcore.dev/v1alpha1".
                          type: string
                        conditionType:
                          description: |-
                            ConditionType checks that the named condition on the referenced object is set to True.
                            Mutually exclusive with FieldMatch.
                          type: string
                        fieldMatch:
