                          description: SecretKeyRef points to a namespaced Secret
                            key.
                          properties:
                            key:
                              description: Key is the key within the referenced object.
                              maxLength: 253
                              minLength: 1
                              type: string
                            name:
                              description: Name is the referenced object name.
                              maxLength: 253
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace is the referenced object namespace.
                              maxLength: 63
                              minLength: 1
                              type: string
                          required:
                          - key
                          - name
                          - namespace
                          type: object
                      type: object
                      x-kubernetes-validations:
                      - message: exactly one of fieldRef, configMapKeyRef, or secretKeyRef
