---
# Example 1: Manual TLS Secret
# Create a TLS secret with your certificate and private key
apiVersion: v1
kind: Secret
metadata:
  name: bmc-tls-cert
  namespace: default
type: kubernetes.io/tls
data:
  # Base64-encoded certificate (PEM format)
  # Generate with: cat cert.pem | base64 -w 0
  tls.crt: LS0tLS1CRUdJTi...  # Your base64-encoded certificate
  # Base64-encoded private key (PEM format)
  # Generate with: cat key.pem | base64 -w 0
  tls.key: LS0tLS1CRUdJTi...  # Your base64-encoded private key

---
# Example 2: BMC using TLS Secret
apiVersion: metal.ironcore.dev/v1alpha1
kind: BMC
metadata:
  labels:
    manufacturer: "Dell"
    app.kubernetes.io/name: bmc
    app.kubernetes.io/instance: bmc-with-tls
    app.kubernetes.io/part-of: metal-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: metal-operator
  name: bmc-with-tls
spec:
  # Network access configuration
  access:
    ip: 192.168.1.100
    macAddress: "00:1A:2B:3C:4D:5E"

  # BMC credentials reference
  bmcSecretRef:
    name: bmcsecret-sample

  # Protocol configuration
  protocol:
    name: Redfish
    port: 443
    scheme: https

  # Optional: BMC hostname
  hostname: "bmc-server-01.example.com"

  # TLS certificate reference
  tlsSecretRef:
    name: bmc-tls-cert
    namespace: default  # Optional: defaults to manager namespace if not specified

---
# Example 3: Using cert-manager to manage the certificate
# First, create a cert-manager Certificate resource
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bmc-certificate
  namespace: default
spec:
  # The secret name that cert-manager will create/update
  secretName: bmc-tls-cert  # This matches the tlsSecretRef above

  # Certificate duration and renewal
  duration: 2160h  # 90 days
  renewBefore: 720h  # Renew 30 days before expiration

  # Subject configuration
  commonName: "bmc-server-01.example.com"
  dnsNames:
    - "bmc-server-01.example.com"
    - "bmc-server-01.internal.example.com"
  ipAddresses:
    - "192.168.1.100"

  # Issuer reference
  issuerRef:
    name: selfsigned-issuer  # Your Issuer or ClusterIssuer name
    kind: Issuer             # "Issuer" or "ClusterIssuer"
    group: cert-manager.io

  # Private key configuration
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always  # Rotate key on renewal

---
# Example 4: Using an external secret manager (e.g., external-secrets-operator)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bmc-external-secret
  namespace: default
spec:
  # Refresh interval
  refreshInterval: 1h

  # Secret store reference (configure based on your setup)
  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  # Target secret
  target:
    name: bmc-tls-cert
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls

  # Data to fetch
  data:
    - secretKey: tls.crt
      remoteRef:
        key: bmc/certificates/server-01
        property: certificate
    - secretKey: tls.key
      remoteRef:
        key: bmc/certificates/server-01
        property: private-key
