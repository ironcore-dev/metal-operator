apiVersion: metal.ironcore.dev/v1alpha1
kind: BMCSettings
metadata:
  labels:
    app.kubernetes.io/name: metal-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/manufacturer: DELL
  name: bmcsettings-dell-sample
spec:
  BMCRef:
    name: endpoint-dell-sample
  version: 1.45.4
  priority: 10
  serverMaintenancePolicy: Enforced
  settingsFlow:
    - name: baseline
      priority: 0
      settings:
        BootMode: "UEFI"
        HyperThreading: "Enabled"
