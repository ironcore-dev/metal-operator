version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - modernize
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - logcheck
  settings:
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    modernize:
      disable:
        - omitzero
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      - linters:
          - dupl
          - lll
          - goconst
        path: bmc/*
      # The Endpoint resource is deprecated (see issue #1018). The operator still
      # serves existing Endpoint objects and the endpointRef access path, so these
      # legacy consumers reference the type until the resource is fully removed.
      - linters:
          - staticcheck
        text: "SA1019.*metalv1alpha1\\.Endpoint"
      # BMC.spec.endpointRef references the deprecated Endpoint resource. The operator
      # still serves existing BMCs that use it, so legacy consumers reference the field
      # until the Endpoint resource is fully removed.
      - linters:
          - staticcheck
        text: "SA1019.*\\.EndpointRef is deprecated"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
