apiVersion: metal.ironcore.dev/v1alpha1
kind: BMCVersion
metadata:
  labels:
    app.kubernetes.io/name: metal-operator
    app.kubernetes.io/managed-by: kustomize
  name: bmcversion-sample
spec:
  version: "2.45.455b66-rev4"
  image:
    URI: "2.45.455b66-rev4"
    transferProtocol: "HTTPS"
  updatePolicy: Normal
  bmcRef:
    name: endpoint-sample
  serverMaintenancePolicy: OwnerApproval
  # readinessGates blocks this BMCVersion in Pending until the named
  # BMCSettings object has its Applied condition set to True.
  # Two equivalent ways to express this:
  readinessGates:
    # Option A: conditionType — checks status.conditions[type=Applied].status == True
    - apiVersion: metal.ironcore.dev/v1alpha1
      kind: BMCSettings
      name: bmcsettings-sample
      conditionType: Applied
    # Option B: fieldMatch — generic field equality check
    # - apiVersion: metal.ironcore.dev/v1alpha1
    #   kind: BMCSettings
    #   name: bmcsettings-sample
    #   fieldMatch:
    #     fieldPath: .status.state
    #     value: Applied
