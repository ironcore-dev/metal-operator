{{- if .Values.webhook.enable }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    {{- if .Values.certManager.enable }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "metal-operator.resourceName" (dict "suffix" "serving-cert" "context" $) }}
    {{- end }}
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/created-by: metal-operator
    app.kubernetes.io/instance: validating-webhook-configuration
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: validatingwebhookconfiguration
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/part-of: metal-operator
  name: {{ include "metal-operator.resourceName" (dict "suffix" "validating-webhook-configuration" "context" $) }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "metal-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-metal-ironcore-dev-v1alpha1-biossettings
  failurePolicy: Fail
  name: vbiossettings-v1alpha1.kb.io
  rules:
  - apiGroups:
    - metal.ironcore.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - biossettings
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "metal-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-metal-ironcore-dev-v1alpha1-biosversion
  failurePolicy: Fail
  name: vbiosversion-v1alpha1.kb.io
  rules:
  - apiGroups:
    - metal.ironcore.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - biosversions
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "metal-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-metal-ironcore-dev-v1alpha1-bmcsecret
  failurePolicy: Fail
  name: vbmcsecret-v1alpha1.kb.io
  rules:
  - apiGroups:
    - metal.ironcore.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - bmcsecrets
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "metal-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-metal-ironcore-dev-v1alpha1-bmcsettings
  failurePolicy: Fail
  name: vbmcsettings-v1alpha1.kb.io
  rules:
  - apiGroups:
    - metal.ironcore.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - bmcsettings
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "metal-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-metal-ironcore-dev-v1alpha1-bmcversion
  failurePolicy: Fail
  name: vbmcversion-v1alpha1.kb.io
  rules:
  - apiGroups:
    - metal.ironcore.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - bmcversions
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "metal-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-metal-ironcore-dev-v1alpha1-endpoint
  failurePolicy: Fail
  name: vendpoint-v1alpha1.kb.io
  rules:
  - apiGroups:
    - metal.ironcore.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - endpoints
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "metal-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-metal-ironcore-dev-v1alpha1-server
  failurePolicy: Fail
  name: vserver-v1alpha1.kb.io
  rules:
  - apiGroups:
    - metal.ironcore.dev
    apiVersions:
    - v1alpha1
    operations:
    - DELETE
    resources:
    - servers
  sideEffects: None
{{- end }}
