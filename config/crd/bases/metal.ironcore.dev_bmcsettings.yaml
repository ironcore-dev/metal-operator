---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bmcsettings.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: BMCSettings
    listKind: BMCSettingsList
    plural: bmcsettings
    singular: bmcsettings
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .spec.priority
      name: Priority
      type: integer
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .spec.BMCRef.name
      name: BMCRef
      type: string
    - jsonPath: .status.lastAppliedTime
      name: LastAppliedTime
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BMCSettings is the Schema for the BMCSettings API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BMCSettingsSpec defines the desired state of BMCSettings.
            properties:
              BMCRef:
                description: BMCRef is a reference to a specific BMC to apply settings
                  to.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
                x-kubernetes-validations:
                - message: BMCRef is immutable
                  rule: self == oldSelf
              priority:
                default: 0
                description: |-
                  Priority controls ordering when multiple BMCSettings target the same BMC.
                  Higher value runs first. Mirrors ServerMaintenance.spec.priority.
                format: int32
                type: integer
              readinessGates:
                description: ReadinessGates blocks this BMCSettings in Pending until
                  all gates are satisfied.
                items:
                  description: |-
                    ReadinessGate blocks a resource in Pending until the referenced object
                    satisfies the specified check.

                    Exactly one of Name or OwnedBy must be set (object resolution):
                      - Name: direct lookup — checks the exact named object.
                      - OwnedBy: set-child lookup — finds the child of Kind that is owned by
                        the named Set and associated with this BMC/Server via ownerReferences.

                    Exactly one of ConditionType or FieldMatch must be set (match criterion):
                      - ConditionType: checks that the named condition is set to True.
                      - FieldMatch: checks that a specific field equals the given value.
                  properties:
                    apiVersion:
                      description: APIVersion of the object whose condition is checked,
                        e.g. "metal.ironcore.dev/v1alpha1".
                      type: string
                    conditionType:
                      description: |-
                        ConditionType checks that the named condition on the referenced object is set to True.
                        Mutually exclusive with FieldMatch.
                      type: string
                    fieldMatch:
                      description: |-
                        FieldMatch checks that a specific field on the referenced object equals the given value.
                        Mutually exclusive with ConditionType.
                      properties:
                        fieldPath:
                          description: |-
                            FieldPath is the dot-notation path to the field on the referenced object,
                            e.g. ".status.state".
                          type: string
                        value:
                          description: Value is the expected string value of the field.
                          type: string
                      required:
                      - fieldPath
                      - value
                      type: object
                    kind:
                      description: Kind of the object whose condition is checked,
                        e.g. "BMCSettings".
                      type: string
                    name:
                      description: |-
                        Name is the exact name of the object to look up.
                        Mutually exclusive with OwnedBy.
                      type: string
                    ownedBy:
                      description: |-
                        OwnedBy resolves the target by finding the child of Kind that is owned
                        by the named Set and associated with this BMC/Server via ownerReferences.
                        Mutually exclusive with Name.
                      properties:
                        kind:
                          description: Kind is the kind of the owning Set CRD, e.g.
                            "BMCSettingsSet".
                          type: string
                        localFieldPath:
                          description: |-
                            LocalFieldPath is the dot-notation path on the *current* resource whose
                            value is used as the match key, e.g. ".metadata.name" or ".spec.serverRef.name".
                            Must be set together with RemoteFieldPath.
                            When both are omitted the controller falls back to ownerReferences.
                          type: string
                        name:
                          description: Name is the name of the owning Set CRD.
                          type: string
                        remoteFieldPath:
                          description: |-
                            RemoteFieldPath is the dot-notation path on the *child* object to compare
                            against LocalFieldPath, e.g. ".spec.serverRef.name" or ".spec.bmcRef.name".
                            Must be set together with LocalFieldPath.
                          type: string
                      required:
                      - kind
                      - name
                      type: object
                      x-kubernetes-validations:
                      - message: localFieldPath and remoteFieldPath must both be set
                          or both be omitted
                        rule: has(self.localFieldPath) == has(self.remoteFieldPath)
                  required:
                  - apiVersion
                  - kind
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of name or ownedBy must be set
                    rule: has(self.name) != has(self.ownedBy)
                  - message: exactly one of conditionType or fieldMatch must be set
                    rule: has(self.conditionType) != has(self.fieldMatch)
                type: array
              retryPolicy:
                description: RetryPolicy defines the retry behavior for automatic
                  retries on transient failures.
                properties:
                  maxAttempts:
                    description: |-
                      MaxAttempts is the maximum number of automatic retry attempts after failure.
                      0 means no automatic retries. Must be between 0 and 10 inclusive.
                      If not set, the operator-level default is used.
                    format: int32
                    maximum: 10
                    minimum: 0
                    type: integer
                type: object
              serverMaintenancePolicy:
                description: ServerMaintenancePolicy is a maintenance policy to be
                  applied on the server.
                type: string
              serverMaintenanceRefs:
                description: |-
                  ServerMaintenanceRefs are references to ServerMaintenance objects which are created by the controller for each
                  server that needs to be updated with the BMC settings.
                items:
                  description: ServerMaintenanceRefItem is a reference to a ServerMaintenance
                    object.
                  properties:
                    serverMaintenanceRef:
                      description: ServerMaintenanceRef is a reference to a ServerMaintenance
                        object that the BMCSettings has requested for the referred
                        server.
                      properties:
                        apiVersion:
                          description: 'Deprecated: APIVersion is no longer used.
                            Retained for backwards compatibility.'
                          type: string
                        kind:
                          description: 'Deprecated: Kind is no longer used. Retained
                            for backwards compatibility.'
                          type: string
                        name:
                          description: Name is the name of the referenced object.
                          type: string
                        namespace:
                          description: Namespace is the namespace of the referenced
                            object.
                          type: string
                        uid:
                          description: 'Deprecated: UID is no longer used. Retained
                            for backwards compatibility.'
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                  type: object
                type: array
              settingsFlow:
                description: |-
                  SettingsFlow is the ordered list of setting groups to apply.
                  Items are applied in ascending Priority order.
                items:
                  description: BMCSettingsFlowItem represents a named, prioritized
                    group of BMC settings to be applied as a unit.
                  properties:
                    name:
                      description: Name uniquely identifies this flow step within
                        the BMCSettings.
                      type: string
                    priority:
                      description: |-
                        Priority controls application order within the flow.
                        Lower numbers are applied first. Must be unique within the flow.
                      format: int32
                      type: integer
                    settings:
                      additionalProperties:
                        type: string
                      description: Settings is the map of BMC manager key=value settings
                        for this step.
                      type: object
                  required:
                  - name
                  - priority
                  type: object
                type: array
              variables:
                description: Variables is a list of variables that can be used in
                  the settings for templating.
                items:
                  properties:
                    key:
                      description: Key is the name of the variable to be used in the
                        BMCSettingsTemplate format.
                      maxLength: 63
                      minLength: 1
                      type: string
                    valueFrom:
                      description: ValueFrom defines a simple single source for the
                        variable value.
                      properties:
                        configMapKeyRef:
                          description: ConfigMapKeyRef points to a namespaced ConfigMap
                            key.
                          properties:
                            key:
                              description: Key is the key within the referenced object.
                              maxLength: 253
                              minLength: 1
                              type: string
                            name:
                              description: Name is the referenced object name.
                              maxLength: 253
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace is the referenced object namespace.
                              maxLength: 63
                              minLength: 1
                              type: string
                          required:
                          - key
                          - name
                          - namespace
                          type: object
                        fieldRef:
                          description: FieldRef sources the value from a field of
                            the BMCSettings object (e.g. spec.BMCRef.name).
                          properties:
                            fieldPath:
                              description: FieldPath is the path of the field on the
                                BMCSettings object to select (e.g. spec.BMCRef.name).
                              maxLength: 256
                              minLength: 1
                              type: string
                          required:
                          - fieldPath
                          type: object
                        secretKeyRef:
                          description: SecretKeyRef points to a namespaced Secret
                            key.
                          properties:
                            key:
                              description: Key is the key within the referenced object.
                              maxLength: 253
                              minLength: 1
                              type: string
                            name:
                              description: Name is the referenced object name.
                              maxLength: 253
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace is the referenced object namespace.
                              maxLength: 63
                              minLength: 1
                              type: string
                          required:
                          - key
                          - name
                          - namespace
                          type: object
                      type: object
                      x-kubernetes-validations:
                      - message: exactly one of fieldRef, configMapKeyRef, or secretKeyRef
                          must be provided
                        rule: '(has(self.fieldRef) ? 1 : 0) + (has(self.configMapKeyRef)
                          ? 1 : 0) + (has(self.secretKeyRef) ? 1 : 0) == 1'
                  required:
                  - key
                  - valueFrom
                  type: object
                maxItems: 64
                type: array
              version:
                description: |-
                  Version is the firmware version these settings are applicable for.
                  Empty means version-agnostic. When created from a BMCSettingsSet with a versionSelector,
                  the controller sets this to the matched version for traceability.
                type: string
            required:
            - BMCRef
            type: object
            x-kubernetes-validations:
            - message: variable keys must be unique
              rule: '!has(self.variables) || self.variables.all(v, self.variables.filter(w,
                w.key == v.key).size() == 1)'
          status:
            description: BMCSettingsStatus defines the observed state of BMCSettings.
            properties:
              conditions:
                description: Conditions represents the latest available observations
                  of the BMC Settings Resource state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failedAttempts:
                description: FailedAttempts is the number of automatic retry attempts
                  made after failure.
                format: int32
                type: integer
              flowState:
                description: FlowState tracks per-step state within settingsFlow.
                items:
                  description: BMCSettingsFlowStatus tracks the per-step state within
                    settingsFlow.
                  properties:
                    name:
                      description: Name is the name of the flow step.
                      type: string
                    state:
                      description: State is the current state of this flow step.
                      type: string
                  required:
                  - name
                  - state
                  type: object
                type: array
              lastAppliedTime:
                description: LastAppliedTime is when the BMCSettings last transitioned
                  to Applied.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              state:
                description: State represents the current state of the BMC configuration
                  task.
                type: string
            type: object
