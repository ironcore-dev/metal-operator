apiVersion: metal.ironcore.dev/v1alpha1
kind: BMCSettingsSet
metadata:
  labels:
    app.kubernetes.io/name: metal-operator
    app.kubernetes.io/managed-by: kustomize
  name: bmcsettingsset-sample
spec:
  bmcSelector:
    matchLabels:
      manufacturer: "dell"
      model: "poweredge-r840"
  # versionSelector narrows the above BMCSelector to only BMCs whose
  # status.firmwareVersion exactly matches one of the listed strings.
  versionSelector:
    versions:
      - "5.00.00.00"
      - "5.10.00.00"
  bmcSettingsTemplate:
    serverMaintenancePolicy: Enforced
    readinessGates: []
    settingsFlow:
      - name: baseline
        priority: 0
        settings:
          BootMode: "UEFI"
          HyperThreading: "Enabled"
          LicenseKey: "$(LicenseKey)"
          FQDN: "$(BmcName).$(SearchDomain)"
      - name: advanced-tuning
        priority: 10
        settings:
          PowerProfile: "MaxPerformance"
          TurboBoost: "Enabled"
    variables:
      - key: BmcName
        valueFrom:
          fieldRef:
            fieldPath: spec.BMCRef.name
      - key: SearchDomain
        valueFrom:
          configMapKeyRef:
            name: "bmc-network-config"
            namespace: "metal-system"
            key: "search-domain"
      - key: LicenseKey
        valueFrom:
          secretKeyRef:
            name: "bmc-licenses"
            namespace: "metal-system"
            key: "$(BmcName)"

