      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .spec.BMCRef.name
      name: BMCRef
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BMCSettings is the Schema for the BMCSettings API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BMCSettingsSpec defines the desired state of BMCSettings.
            properties:
              BMCRef:
                description: BMCRef is a reference to a specific BMC to apply settings
                  to.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
                x-kubernetes-validations:
                - message: BMCRef is immutable
                  rule: self == oldSelf
              retryPolicy:
                description: RetryPolicy defines the retry behavior for automatic
                  retries on transient failures.
                properties:
                  maxAttempts:
                    description: |-
                      MaxAttempts is the maximum number of automatic retry attempts after failure.
                      0 means no automatic retries. Must be between 0 and 10 inclusive.
                      If not set, the operator-level default is used.
                    format: int32
                    maximum: 10
                    minimum: 0
                    type: integer
                type: object
              serverMaintenancePolicy:
                description: ServerMaintenancePolicy is a maintenance policy to be
                  applied on the server.
                type: string
              serverMaintenanceRefs:
                description: |-
                  ServerMaintenanceRefs are references to ServerMaintenance objects which are created by the controller for each
                  server that needs to be updated with the BMC settings.
