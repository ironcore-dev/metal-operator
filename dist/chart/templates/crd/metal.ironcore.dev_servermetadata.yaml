{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: servermetadata.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: ServerMetadata
    listKind: ServerMetadataList
    plural: servermetadata
    shortNames:
    - smd
    singular: servermetadata
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ServerMetadata is a flat data object (no spec/status) that persists the full
          probe agent discovery payload. Similar to how Endpoints or ConfigMap store
          data directly at the root level. The relationship to its Server is
          established by using the same name and an owner reference.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          cpu:
            description: CPU is a list of CPUs discovered on the server.
            items:
              properties:
                capabilities:
                  items:
                    type: string
                  type: array
                id:
                  type: integer
                model:
                  type: string
                totalCores:
                  format: int32
                  type: integer
                totalHardwareThreads:
                  format: int32
                  type: integer
                vendor:
                  type: string
              required:
              - id
              type: object
            type: array
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          lldp:
            description: LLDP contains LLDP neighbor information per interface.
            items:
              properties:
                name:
                  type: string
                neighbors:
                  items:
                    properties:
                      capabilities:
                        items:
                          type: string
                        type: array
                      chassisId:
                        type: string
                      mgmtIp:
                        type: string
                      portDescription:
                        type: string
                      portId:
                        type: string
                      systemDescription:
                        type: string
                      systemName:
                        type: string
                      vlanId:
                        type: string
                    type: object
                  type: array
              required:
              - name
              type: object
            type: array
          memory:
            description: Memory is a list of memory devices discovered on the server.
            items:
              properties:
                assetTag:
                  type: string
                bankLocator:
                  type: string
                configuredMemorySpeed:
                  type: string
                configuredVoltage:
                  type: string
                deviceLocator:
                  type: string
                deviceSet:
                  type: string
                maximumVoltage:
                  type: string
                memoryType:
                  type: string
                minimumVoltage:
                  type: string
                partNumber:
                  type: string
                serialNumber:
                  type: string
                size:
                  format: int64
                  type: integer
                speed:
                  type: string
                vendor:
                  type: string
              type: object
            type: array
          metadata:
            type: object
          networkInterfaces:
            description: NetworkInterfaces is a list of network interfaces discovered
              on the server.
            items:
              properties:
                carrierStatus:
                  type: string
                ipAddresses:
                  items:
                    type: string
                  type: array
                macAddress:
                  type: string
                name:
                  type: string
              required:
              - macAddress
              - name
              type: object
            type: array
          nics:
            description: NICs is a list of raw NIC details (PCI address, speed, firmware).
            items:
              properties:
                firmwareVersion:
                  type: string
                linkModes:
                  items:
                    type: string
                  type: array
                mac:
                  type: string
                name:
                  type: string
                pciAddress:
                  type: string
                speed:
                  type: string
                supportedPorts:
                  items:
                    type: string
                  type: array
              type: object
            type: array
          pciDevices:
            description: PCIDevices is a list of PCI devices discovered on the server.
            items:
              properties:
                address:
                  type: string
                numaNodeID:
                  type: integer
                product:
                  type: string
                productID:
                  type: string
                vendor:
                  type: string
                vendorID:
                  type: string
              type: object
            type: array
          storage:
            description: Storage is a list of block devices discovered on the server.
            items:
              properties:
                hWSectorSize:
                  format: int64
                  type: integer
                logicalBlockSize:
                  format: int64
                  type: integer
                model:
                  type: string
                name:
                  type: string
                numaNodeID:
                  type: integer
                path:
                  type: string
                physicalBlockSize:
                  format: int64
                  type: integer
                readOnly:
                  type: boolean
                removable:
                  type: boolean
                rotational:
                  type: boolean
                serial:
                  type: string
                sizeBytes:
                  format: int64
                  type: integer
                vendor:
                  type: string
                wwid:
                  type: string
              type: object
            type: array
          systemInfo:
            description: SystemInfo contains BIOS, system, and board information from
              DMI/SMBIOS.
            properties:
              biosInformation:
                properties:
                  date:
                    type: string
                  vendor:
                    type: string
                  version:
                    type: string
                type: object
              boardInformation:
                properties:
                  assetTag:
                    type: string
                  manufacturer:
                    type: string
                  product:
                    type: string
                  serialNumber:
                    type: string
                  version:
                    type: string
                type: object
              systemInformation:
                properties:
                  family:
                    type: string
                  manufacturer:
                    type: string
                  productName:
                    type: string
                  serialNumber:
                    type: string
                  skuNumber:
                    type: string
                  uuid:
                    type: string
                  version:
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
{{- end -}}
