                                        minLength: 1
                                        type: string
                                      name:
                                        description: Name is the referenced object
                                          name.
                                        maxLength: 253
                                        minLength: 1
                                        type: string
                                      namespace:
                                        description: Namespace is the referenced object
                                          namespace.
                                        maxLength: 63
                                        minLength: 1
                                        type: string
                                    required:
                                    - key
                                    - name
                                    - namespace
                                    type: object
                                  fieldRef:
                                    description: FieldRef sources the value from a
                                      field of the subject object (e.g. metadata.name).
                                    properties:
                                      fieldPath:
                                        description: FieldPath is the path of the
                                          field on the subject object to select (e.g.
