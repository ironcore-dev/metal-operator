apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metaldata
  namespace: system
  labels:
    app.kubernetes.io/name: metal-operator
    app.kubernetes.io/component: metaldata
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: metal-operator
      app.kubernetes.io/component: metaldata
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metal-operator
        app.kubernetes.io/component: metaldata
    spec:
      serviceAccountName: metaldata
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: metaldata
        image: metaldata:latest
        command:
        - /metaldata
        ports:
        - name: http
          containerPort: 10002
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        - name: metrics
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
