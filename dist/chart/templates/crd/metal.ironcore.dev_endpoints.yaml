{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: endpoints.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: Endpoint
    listKind: EndpointList
    plural: endpoints
    shortNames:
    - mep
    singular: endpoint
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.macAddress
      name: MACAddress
      type: string
    - jsonPath: .spec.ip
      name: IP
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    deprecated: true
    deprecationWarning: metal.ironcore.dev/v1alpha1 Endpoints are deprecated; specify
      the network access inline via BMC.spec.access (an InlineEndpoint with macAddress
      and ip) instead
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Endpoint is the Schema for the endpoints API

          Deprecated: The Endpoint resource is deprecated. Model the same information
          inline via BMC.spec.access (an InlineEndpoint carrying the MAC address and IP)
          instead of creating a separate Endpoint object.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EndpointSpec defines the desired state of Endpoint
            properties:
              ip:
                description: IP is the IP address of the endpoint.
                type: string
              macAddress:
                description: MACAddress is the MAC address of the endpoint.
                type: string
            type: object
          status:
            description: EndpointStatus defines the observed state of Endpoint
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
