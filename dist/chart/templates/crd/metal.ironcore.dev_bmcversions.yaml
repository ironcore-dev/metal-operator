{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bmcversions.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: BMCVersion
    listKind: BMCVersionList
    plural: bmcversions
    shortNames:
    - bmcv
    singular: bmcversion
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: BMCVersion
      type: string
    - jsonPath: .spec.updatePolicy
      name: UpdatePolicy
      type: string
    - jsonPath: .spec.bmcRef.name
      name: BMCRef
      type: string
    - jsonPath: .status.upgradeTask.percentageComplete
      name: TaskProgress
      type: integer
    - jsonPath: .status.upgradeTask.state
      name: TaskState
      type: string
    - jsonPath: .status.upgradeTask.status
      name: TaskStatus
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BMCVersion is the Schema for the bmcversions API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BMCVersionSpec defines the desired state of BMCVersion.
            properties:
              bmcRef:
                description: BMCRef is a reference to a specific BMC to apply BMC
                  upgrade on.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
                x-kubernetes-validations:
                - message: bmcRef is immutable
                  rule: self == oldSelf
              image:
                description: Image specifies the image to use to upgrade to the given
                  BMC version.
                properties:
                  URI:
                    description: URI is the URI of the software image to install.
                    type: string
                  secretRef:
                    description: SecretRef is a reference to the Secret containing
                      the credentials to access the image URI.
                    properties:
                      name:
                        description: name is unique within a namespace to reference
                          a secret resource.
                        type: string
                      namespace:
                        description: namespace defines the space within which the
                          secret name must be unique.
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  transferProtocol:
                    description: TransferProtocol is the network protocol used to
                      retrieve the image URI.
                    type: string
                required:
                - URI
                type: object
              readinessGates:
                description: ReadinessGates blocks this BMCVersion in Pending until
                  all gates are satisfied.
                items:
                  description: |-
                    ReadinessGate blocks a resource in Pending until the referenced object
                    satisfies the specified check.

                    Object resolution — Name must resolve to a literal object name.
                    On concrete child objects (BMCVersion, BMCSettings) Name is always a
                    literal string. In Set templates, Name may contain $(VAR_NAME) references
                    that are resolved from the gate's own Variables list by the Set controller
                    at stamp time; the stamped child always receives a literal name.

                    Exactly one of ConditionType or FieldMatch must be set (match criterion):
                      - ConditionType: checks that the named condition is set to True.
                      - FieldMatch: checks that a specific field equals the given value.
                  properties:
                    apiVersion:
                      description: APIVersion of the object whose condition is checked,
                        e.g. "metal.ironcore.dev/v1alpha1".
                      type: string
                    conditionType:
                      description: |-
                        ConditionType checks that the named condition on the referenced object is set to True.
                        Mutually exclusive with FieldMatch.
                      type: string
                    fieldMatch:
                      description: |-
                        FieldMatch checks that a specific field on the referenced object equals the given value.
                        Mutually exclusive with ConditionType.
                      properties:
                        fieldPath:
                          description: |-
                            FieldPath is the dot-notation path to the field on the referenced object,
                            e.g. ".status.state".
                          type: string
                        value:
                          description: Value is the expected string value of the field.
                          type: string
                      required:
                      - fieldPath
                      - value
                      type: object
                    kind:
                      description: Kind of the object whose condition is checked,
                        e.g. "BMCSettings".
                      type: string
                    name:
                      description: |-
                        Name of the object to look up. On concrete child objects this is always a
                        literal name. It may contain $(VAR_NAME) references
                        resolved from Variables at stamp time.
                      type: string
                    variables:
                      description: |-
                        Variables defines $(VAR_NAME) substitutions used in the Name field of this gate.
                        Resolved by the Set controller at stamp time; always empty on concrete child objects.
                        fieldRef variables are resolved first; ownedByRef variables are resolved second
                        and may reference $(VAR_NAME) values from fieldRef variables in their matchField.value.
                      items:
                        description: |-
                          Variable defines a single named variable used in $(VAR_NAME) substitution
                          within BMCSettingsTemplate settings values and ReadinessGate Name fields.
                          Variables are resolved by the Set controller at stamp time.
                        properties:
                          key:
                            description: Key is the variable name, referenced as $(KEY)
                              in template strings.
                            maxLength: 63
                            minLength: 1
                            type: string
                          valueFrom:
                            description: ValueFrom defines a single source for the
                              variable value.
                            properties:
                              configMapKeyRef:
                                description: ConfigMapKeyRef points to a namespaced
                                  ConfigMap key.
                                properties:
                                  key:
                                    description: Key is the key within the referenced
                                      object.
                                    maxLength: 253
                                    minLength: 1
                                    type: string
                                  name:
                                    description: Name is the referenced object name.
                                    maxLength: 253
                                    minLength: 1
                                    type: string
                                  namespace:
                                    description: Namespace is the referenced object
                                      namespace.
                                    maxLength: 63
                                    minLength: 1
                                    type: string
                                required:
                                - key
                                - name
                                - namespace
                                type: object
                              fieldRef:
                                description: FieldRef sources the value from a field
                                  of the subject object (e.g. metadata.name).
                                properties:
                                  fieldPath:
                                    description: FieldPath is the path of the field
                                      on the subject object to select (e.g. metadata.name).
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                required:
                                - fieldPath
                                type: object
                              ownedByRef:
                                description: |-
                                  OwnedByRef finds the sibling child of the named Set that matches the
                                  given field filter, and resolves to that child's name.
                                properties:
                                  kind:
                                    description: Kind of the owning Set CRD, e.g.
                                      "BMCSettingsSet" or "BMCVersionSet".
                                    type: string
                                  matchField:
                                    description: |-
                                      MatchField filters among all children owned by Kind/Name.
                                      The Set controller picks the child where MatchField.FieldPath
                                      equals MatchField.Value ($(VAR) substitution applied to Value).
                                    properties:
                                      fieldPath:
                                        description: |-
                                          FieldPath is the dot-notation path on the sibling child object to filter by,
                                          e.g. ".spec.bmcRef.name".
                                        type: string
                                      value:
                                        description: |-
                                          Value is the expected value of FieldPath. Supports $(VAR_NAME) substitution
                                          using variables defined earlier in the same gate's variables list.
                                        type: string
                                    required:
                                    - fieldPath
                                    - value
                                    type: object
                                  name:
                                    description: Name of the owning Set CRD.
                                    type: string
                                required:
                                - kind
                                - matchField
                                - name
                                type: object
                              secretKeyRef:
                                description: SecretKeyRef points to a namespaced Secret
                                  key.
                                properties:
                                  key:
                                    description: Key is the key within the referenced
                                      object.
                                    maxLength: 253
                                    minLength: 1
                                    type: string
                                  name:
                                    description: Name is the referenced object name.
                                    maxLength: 253
                                    minLength: 1
                                    type: string
                                  namespace:
                                    description: Namespace is the referenced object
                                      namespace.
                                    maxLength: 63
                                    minLength: 1
                                    type: string
                                required:
                                - key
                                - name
                                - namespace
                                type: object
                            type: object
                            x-kubernetes-validations:
                            - message: exactly one of fieldRef, configMapKeyRef, secretKeyRef,
                                or ownedByRef must be provided
                              rule: '(has(self.fieldRef) ? 1 : 0) + (has(self.configMapKeyRef)
                                ? 1 : 0) + (has(self.secretKeyRef) ? 1 : 0) + (has(self.ownedByRef)
                                ? 1 : 0) == 1'
                        required:
                        - key
                        - valueFrom
                        type: object
                      type: array
                  required:
                  - apiVersion
                  - kind
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of conditionType or fieldMatch must be set
                    rule: has(self.conditionType) != has(self.fieldMatch)
                type: array
              retryPolicy:
                description: RetryPolicy defines the retry behavior for automatic
                  retries on transient failures.
                properties:
                  maxAttempts:
                    description: |-
                      MaxAttempts is the maximum number of automatic retry attempts after failure.
                      0 means no automatic retries. Must be between 0 and 10 inclusive.
                      If not set, the operator-level default is used.
                    format: int32
                    maximum: 10
                    minimum: 0
                    type: integer
                type: object
              serverMaintenancePolicy:
                description: ServerMaintenancePolicy is a maintenance policy to be
                  enforced on the server managed by referred BMC.
                type: string
              serverMaintenanceRefs:
                description: ServerMaintenanceRefs are references to ServerMaintenance
                  objects that the controller has requested for the related servers.
                items:
                  description: ObjectReference is the namespaced name reference to
                    an object.
                  properties:
                    apiVersion:
                      description: 'Deprecated: APIVersion is no longer used. Retained
                        for backwards compatibility.'
                      type: string
                    kind:
                      description: 'Deprecated: Kind is no longer used. Retained for
                        backwards compatibility.'
                      type: string
                    name:
                      description: Name is the name of the referenced object.
                      type: string
                    namespace:
                      description: Namespace is the namespace of the referenced object.
                      type: string
                    uid:
                      description: 'Deprecated: UID is no longer used. Retained for
                        backwards compatibility.'
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
              updatePolicy:
                description: UpdatePolicy indicates whether the server's upgrade service
                  should bypass vendor update policies.
                type: string
              version:
                description: Version specifies the BMC version to upgrade to.
                type: string
            required:
            - image
            - version
            type: object
          status:
            description: BMCVersionStatus defines the observed state of BMCVersion.
            properties:
              conditions:
                description: Conditions represents the latest available observations
                  of the BMC version upgrade state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failedAttempts:
                description: FailedAttempts is the number of automatic retry attempts
                  made after failure.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              state:
                description: State represents the current state of the BMC configuration
                  task.
                type: string
              upgradeTask:
                description: UpgradeTask contains the state of the upgrade task created
                  by the BMC.
                properties:
                  URI:
                    description: URI is the URI of the task created by the BMC for
                      the BIOS upgrade.
                    type: string
                  percentageComplete:
                    description: PercentComplete is the percentage of completion of
                      the task.
                    format: int32
                    type: integer
                  state:
                    description: State is the current state of the task.
                    type: string
                  status:
                    description: Status is the current status of the task.
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
