version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - modernize
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - logcheck
  settings:
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    modernize:
      disable:
        - omitzero
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      - linters:
          - dupl
          - lll
          - goconst
        path: bmc/*
      # ServerMaintenance, BMCSettings, BMCVersion, BIOSVersion, BIOSSettings and their
      # Set variants are deprecated. The operator still serves and reconciles the
      # existing resources, so these legacy consumers reference the types until they
      # are fully removed.
      - linters:
          - staticcheck
        text: "SA1019.*metalv1alpha1\\.(ServerMaintenance|BMCSettingsSet|BMCSettings|BMCVersionSet|BMCVersion|BIOSVersionSet|BIOSVersion|BIOSSettingsSet|BIOSSettings)\\b"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
