---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bmcsettingssets.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: BMCSettingsSet
    listKind: BMCSettingsSetList
    plural: bmcsettingssets
    singular: bmcsettingsset
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.bmcSettingsTemplate.version
      name: BMCVersion
      type: string
    - jsonPath: .status.fullyLabeledBMCs
      name: TotalBMCs
      type: integer
    - jsonPath: .status.availableBMCSettings
      name: AvailableBMCSettings
      type: integer
    - jsonPath: .status.pendingBMCSettings
      name: Pending
      type: integer
    - jsonPath: .status.inProgressBMCSettings
      name: InProgress
      type: integer
    - jsonPath: .status.completedBMCSettings
      name: Completed
      type: integer
    - jsonPath: .status.failedBMCSettings
      name: Failed
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BMCSettingsSet is the Schema for the bmcsettingssets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BMCSettingsSetSpec defines the desired state of BMCSettingsSet.
            properties:
              bmcSelector:
                description: BMCSelector specifies a label selector to identify the
                  BMCs to be selected.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              bmcSettingsTemplate:
                description: BMCSettingsTemplate defines the template for the BMCSettings
                  resource to be applied to the BMCs.
                properties:
                  serverMaintenancePolicy:
                    description: ServerMaintenancePolicy is a maintenance policy to
                      be applied on the server.
                    type: string
                  settings:
                    additionalProperties:
                      type: string
                    description: SettingsMap contains BMC settings as a map.
                    type: object
                  version:
                    description: Version specifies the BMC firmware version for which
                      the settings should be applied.
                    type: string
                required:
                - version
                type: object
              dynamicVariables:
                description: DynamicVariables defines the dynamic variables for the
                  BMCSettingsSet which allows users to specify variables in the BMC
                  settings and their sources which will be resolved by the controller
                  at runtime and injected into the BMC settings before applying them
                  to the BMCs.
                items:
                  properties:
                    bmcLabel:
                      description: BMCLabel is used to specify the label of the BMC
                        from which the variable value will be sourced. The controller
                        will look for the label in the BMC's labels and use its value
                        as the variable's value.
                      type: string
                    key:
                      description: |-
                        Key is used to specify the key of the value in data from the object defined in 'ObjectKeyRef'.
                        For example, if the variable is supposed to get its value from a ConfigMap, 'ObjectKeyRef' contains the reference to the ConfigMap and 'Key' can be used to specify the key of the value in the ConfigMap's data.
                      type: string
                    name:
                      description: Name specifies the variable name, referenced in
                        BMC settings using the `{{ .Name }}` syntax.
                      maxLength: 256
                      minLength: 1
                      type: string
                    objectKeyRef:
                      description: ObjectKeyRef is used to specify the reference to
                        the object which contains the value of the variable.
                      properties:
                        apiVersion:
                          description: APIVersion is the API version of the referenced
                            object.
                          type: string
                        kind:
                          description: Kind is the kind of the referenced object.
                          type: string
                        name:
                          description: Name is the name of the referenced object.
                          type: string
                        namespace:
                          description: Namespace is the namespace of the referenced
                            object.
                          type: string
                        uid:
                          description: UID is the uid of the referenced object.
                          type: string
                      required:
                      - apiVersion
                      - kind
                      - name
                      - namespace
                      - uid
                      type: object
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: key must be provided when objectKeyRef is set
                    rule: '!has(self.objectKeyRef) || (has(self.key) && size(self.key)
                      > 0)'
                  - message: objectKeyRef.kind must be provided when objectKeyRef
                      is set
                    rule: '!has(self.objectKeyRef) || size(self.objectKeyRef.kind)
                      > 0'
                  - message: either objectKeyRef or bmcLabel must be provided
                    rule: has(self.objectKeyRef) || (has(self.bmcLabel) && size(self.bmcLabel)
                      > 0)
                type: array
            required:
            - bmcSelector
            - bmcSettingsTemplate
            type: object
          status:
            description: BMCSettingsSetStatus defines the observed state of BMCSettingsSet.
            properties:
              availableBMCSettings:
                description: AvailableBMCSettings is the number of BMCSettings currently
                  created by the set.
                format: int32
                type: integer
              completedBMCSettings:
                description: CompletedBMCSettings is the total number of completed
                  BMCSettings in the set.
                format: int32
                type: integer
              failedBMCSettings:
                description: FailedBMCSettings is the total number of failed BMCSettings
                  in the set.
                format: int32
                type: integer
              fullyLabeledBMCs:
                description: FullyLabeledBMCs is the number of BMCs in the set.
                format: int32
                type: integer
              inProgressBMCSettings:
                description: InProgressBMCSettings is the total number of BMCSettings
                  in the set that are currently in progress.
                format: int32
                type: integer
              pendingBMCSettings:
                description: PendingBMCSettings is the total number of pending BMCSettings
                  in the set.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
