                                  minLength: 1
                                  type: string
                                name:
                                  description: Name is the referenced object name.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                namespace:
                                  description: Namespace is the referenced object
                                    namespace.
                                  maxLength: 63
                                  minLength: 1
                                  type: string
