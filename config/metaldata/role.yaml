apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metaldata-role
  labels:
    app.kubernetes.io/name: metal-operator
    app.kubernetes.io/component: metaldata
    app.kubernetes.io/managed-by: kustomize
rules:
- apiGroups:
  - metal.ironcore.dev
  resources:
  - servers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - metal.ironcore.dev
  resources:
  - serverclaims
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
