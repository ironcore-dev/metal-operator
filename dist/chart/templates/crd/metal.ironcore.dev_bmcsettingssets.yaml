{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bmcsettingssets.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: BMCSettingsSet
    listKind: BMCSettingsSetList
    plural: bmcsettingssets
    singular: bmcsettingsset
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.fullyLabeledBMCs
      name: TotalBMCs
      type: integer
    - jsonPath: .status.availableBMCSettings
      name: AvailableBMCSettings
      type: integer
    - jsonPath: .status.pendingBMCSettings
      name: Pending
      type: integer
    - jsonPath: .status.inProgressBMCSettings
      name: InProgress
      type: integer
    - jsonPath: .status.completedBMCSettings
      name: Completed
      type: integer
    - jsonPath: .status.failedBMCSettings
      name: Failed
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BMCSettingsSet is the Schema for the bmcsettingssets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BMCSettingsSetSpec defines the desired state of BMCSettingsSet.
            properties:
              bmcSelector:
                description: BMCSelector specifies a label selector to identify the
                  BMCs to be selected.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              bmcSettingsTemplate:
                description: BMCSettingsTemplate defines the template for the BMCSettings
                  resource to be applied to the BMCs.
                properties:
                  priority:
                    default: 0
                    description: |-
                      Priority controls ordering when multiple BMCSettings target the same BMC.
                      Higher value runs first. Mirrors ServerMaintenance.spec.priority.
                    format: int32
                    type: integer
                  readinessGates:
                    description: ReadinessGates blocks this BMCSettings in Pending
                      until all gates are satisfied.
                    items:
                      description: |-
                        ReadinessGate blocks a resource in Pending until the referenced object
                        satisfies the specified check.

                        Exactly one of Name or OwnedBy must be set (object resolution):
                          - Name: direct lookup — checks the exact named object.
                          - OwnedBy: set-child lookup — finds the child of Kind that is owned by
                            the named Set and associated with this BMC/Server via ownerReferences.

                        Exactly one of ConditionType or FieldMatch must be set (match criterion):
                          - ConditionType: checks that the named condition is set to True.
                          - FieldMatch: checks that a specific field equals the given value.
                      properties:
                        apiVersion:
                          description: APIVersion of the object whose condition is
                            checked, e.g. "metal.ironcore.dev/v1alpha1".
                          type: string
                        conditionType:
                          description: |-
                            ConditionType checks that the named condition on the referenced object is set to True.
                            Mutually exclusive with FieldMatch.
                          type: string
                        fieldMatch:
                          description: |-
                            FieldMatch checks that a specific field on the referenced object equals the given value.
                            Mutually exclusive with ConditionType.
                          properties:
                            fieldPath:
                              description: |-
                                FieldPath is the dot-notation path to the field on the referenced object,
                                e.g. ".status.state".
                              type: string
                            value:
                              description: Value is the expected string value of the
                                field.
                              type: string
                          required:
                          - fieldPath
                          - value
                          type: object
                        kind:
                          description: Kind of the object whose condition is checked,
                            e.g. "BMCSettings".
                          type: string
                        name:
                          description: |-
                            Name is the exact name of the object to look up.
                            Mutually exclusive with OwnedBy.
                          type: string
                        ownedBy:
                          description: |-
                            OwnedBy resolves the target by finding the child of Kind that is owned
                            by the named Set and associated with this BMC/Server via ownerReferences.
                            Mutually exclusive with Name.
                          properties:
                            kind:
                              description: Kind is the kind of the owning Set CRD,
                                e.g. "BMCSettingsSet".
                              type: string
                            localFieldPath:
                              description: |-
                                LocalFieldPath is the dot-notation path on the *current* resource whose
                                value is used as the match key, e.g. ".metadata.name" or ".spec.serverRef.name".
                                Must be set together with RemoteFieldPath.
                                When both are omitted the controller falls back to ownerReferences.
                              type: string
                            name:
                              description: Name is the name of the owning Set CRD.
                              type: string
                            remoteFieldPath:
                              description: |-
                                RemoteFieldPath is the dot-notation path on the *child* object to compare
                                against LocalFieldPath, e.g. ".spec.serverRef.name" or ".spec.bmcRef.name".
                                Must be set together with LocalFieldPath.
                              type: string
                          required:
                          - kind
                          - name
                          type: object
                          x-kubernetes-validations:
                          - message: localFieldPath and remoteFieldPath must both
                              be set or both be omitted
                            rule: has(self.localFieldPath) == has(self.remoteFieldPath)
                      required:
                      - apiVersion
                      - kind
                      type: object
                      x-kubernetes-validations:
                      - message: exactly one of name or ownedBy must be set
                        rule: has(self.name) != has(self.ownedBy)
                      - message: exactly one of conditionType or fieldMatch must be
                          set
                        rule: has(self.conditionType) != has(self.fieldMatch)
                    type: array
                  retryPolicy:
                    description: RetryPolicy defines the retry behavior for automatic
                      retries on transient failures.
                    properties:
                      maxAttempts:
                        description: |-
                          MaxAttempts is the maximum number of automatic retry attempts after failure.
                          0 means no automatic retries. Must be between 0 and 10 inclusive.
                          If not set, the operator-level default is used.
                        format: int32
                        maximum: 10
                        minimum: 0
                        type: integer
                    type: object
                  serverMaintenancePolicy:
                    description: ServerMaintenancePolicy is a maintenance policy to
                      be applied on the server.
                    type: string
                  settingsFlow:
                    description: |-
                      SettingsFlow is the ordered list of setting groups to apply.
                      Items are applied in ascending Priority order.
                    items:
                      description: BMCSettingsFlowItem represents a named, prioritized
                        group of BMC settings to be applied as a unit.
                      properties:
                        name:
                          description: Name uniquely identifies this flow step within
                            the BMCSettings.
                          type: string
                        priority:
                          description: |-
                            Priority controls application order within the flow.
                            Lower numbers are applied first. Must be unique within the flow.
                          format: int32
                          type: integer
                        settings:
                          additionalProperties:
                            type: string
                          description: Settings is the map of BMC manager key=value
                            settings for this step.
                          type: object
                      required:
                      - name
                      - priority
                      type: object
                    type: array
                  variables:
                    description: Variables is a list of variables that can be used
                      in the settings for templating.
                    items:
                      properties:
                        key:
                          description: Key is the name of the variable to be used
                            in the BMCSettingsTemplate format.
                          maxLength: 63
                          minLength: 1
                          type: string
                        valueFrom:
                          description: ValueFrom defines a simple single source for
                            the variable value.
                          properties:
                            configMapKeyRef:
                              description: ConfigMapKeyRef points to a namespaced
                                ConfigMap key.
                              properties:
                                key:
                                  description: Key is the key within the referenced
                                    object.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                name:
                                  description: Name is the referenced object name.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                namespace:
                                  description: Namespace is the referenced object
                                    namespace.
                                  maxLength: 63
                                  minLength: 1
                                  type: string
                              required:
                              - key
                              - name
                              - namespace
                              type: object
                            fieldRef:
                              description: FieldRef sources the value from a field
                                of the BMCSettings object (e.g. spec.BMCRef.name).
                              properties:
                                fieldPath:
                                  description: FieldPath is the path of the field
                                    on the BMCSettings object to select (e.g. spec.BMCRef.name).
                                  maxLength: 256
                                  minLength: 1
                                  type: string
                              required:
                              - fieldPath
                              type: object
                            secretKeyRef:
                              description: SecretKeyRef points to a namespaced Secret
                                key.
                              properties:
                                key:
                                  description: Key is the key within the referenced
                                    object.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                name:
                                  description: Name is the referenced object name.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                namespace:
                                  description: Namespace is the referenced object
                                    namespace.
                                  maxLength: 63
                                  minLength: 1
                                  type: string
                              required:
                              - key
                              - name
                              - namespace
                              type: object
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of fieldRef, configMapKeyRef, or
                              secretKeyRef must be provided
                            rule: '(has(self.fieldRef) ? 1 : 0) + (has(self.configMapKeyRef)
                              ? 1 : 0) + (has(self.secretKeyRef) ? 1 : 0) == 1'
                      required:
                      - key
                      - valueFrom
                      type: object
                    maxItems: 64
                    type: array
                  version:
                    description: |-
                      Version is the firmware version these settings are applicable for.
                      Empty means version-agnostic. When created from a BMCSettingsSet with a versionSelector,
                      the controller sets this to the matched version for traceability.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: variable keys must be unique
                  rule: '!has(self.variables) || self.variables.all(v, self.variables.filter(w,
                    w.key == v.key).size() == 1)'
              versionSelector:
                description: |-
                  VersionSelector is an additional filter applied on top of BMCSelector.
                  Only BMCs whose status.firmwareVersion exactly matches one of the listed strings
                  will receive a stamped BMCSettings child. When omitted, all BMCs matched by
                  BMCSelector are included regardless of firmware version.
                properties:
                  versions:
                    description: |-
                      Versions is the list of exact firmware version strings to match.
                      If empty or omitted, all firmware versions are included.
                    items:
                      type: string
                    type: array
                type: object
            required:
            - bmcSelector
            - bmcSettingsTemplate
            type: object
          status:
            description: BMCSettingsSetStatus defines the observed state of BMCSettingsSet.
            properties:
              availableBMCSettings:
                description: AvailableBMCSettings is the number of BMCSettings currently
                  created by the set.
                format: int32
                type: integer
              completedBMCSettings:
                description: CompletedBMCSettings is the total number of completed
                  BMCSettings in the set.
                format: int32
                type: integer
              failedBMCSettings:
                description: FailedBMCSettings is the total number of failed BMCSettings
                  in the set.
                format: int32
                type: integer
              fullyLabeledBMCs:
                description: FullyLabeledBMCs is the number of BMCs in the set.
                format: int32
                type: integer
              inProgressBMCSettings:
                description: InProgressBMCSettings is the total number of BMCSettings
                  in the set that are currently in progress.
                format: int32
                type: integer
              pendingBMCSettings:
                description: PendingBMCSettings is the total number of pending BMCSettings
                  in the set.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
