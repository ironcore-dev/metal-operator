{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bmcsettingssets.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: BMCSettingsSet
    listKind: BMCSettingsSetList
    plural: bmcsettingssets
    singular: bmcsettingsset
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.bmcSettingsTemplate.version
      name: BMCVersion
      type: string
    - jsonPath: .status.fullyLabeledBMCs
      name: TotalBMCs
      type: integer
    - jsonPath: .status.availableBMCSettings
      name: AvailableBMCSettings
      type: integer
    - jsonPath: .status.pendingBMCSettings
      name: Pending
      type: integer
    - jsonPath: .status.inProgressBMCSettings
      name: InProgress
      type: integer
    - jsonPath: .status.completedBMCSettings
      name: Completed
      type: integer
    - jsonPath: .status.failedBMCSettings
      name: Failed
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BMCSettingsSet is the Schema for the bmcsettingssets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BMCSettingsSetSpec defines the desired state of BMCSettingsSet.
            properties:
              bmcSelector:
                description: BMCSelector specifies a label selector to identify the
                  BMCs to be selected.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              bmcSettingsTemplate:
                description: BMCSettingsTemplate defines the template for the BMCSettings
                  resource to be applied to the BMCs.
                properties:
                  serverMaintenancePolicy:
                    description: ServerMaintenancePolicy is a maintenance policy to
                      be applied on the server.
                    type: string
                  settings:
                    additionalProperties:
                      type: string
                    description: SettingsMap contains BMC settings as a map.
                    type: object
                  version:
                    description: Version specifies the BMC firmware version for which
                      the settings should be applied.
                    type: string
                required:
                - version
                type: object
              dynamicSettings:
                description: DynamicSettings defines the dynamic settings for the
                  BMCSettingsSet which allows users to specify variables in the BMC
                  settings and their sources which will be resolved by the controller
                  at runtime and injected into the BMC settings before applying them
                  to the BMCs.
                properties:
                  objectKeyRef:
                    items:
                      description: ObjectReference is the namespaced name reference
                        to an object.
                      properties:
                        apiVersion:
                          description: APIVersion is the API version of the referenced
                            object.
                          type: string
                        kind:
                          description: Kind is the kind of the referenced object.
                          type: string
                        name:
                          description: Name is the name of the referenced object.
                          type: string
                        namespace:
                          description: Namespace is the namespace of the referenced
                            object.
                          type: string
                        uid:
                          description: UID is the uid of the referenced object.
                          type: string
                      required:
                      - apiVersion
                      - kind
                      - name
                      - namespace
                      - uid
                      type: object
                    type: array
                  variables:
                    items:
                      properties:
                        key:
                          description: |-
                            Key is used to specify the key of the value in data from the object identified by 'ObjectName' and 'ObjectKind'  in 'ObjectKeyRefs'.
                            For example, if the variable is supposed to get its value from a ConfigMap, 'ObjectName' along with ObjectKind can be used to identify the ConfigMap object in 'ObjectKeyRefs' and 'Key' can be used to specify the key of the value in the ConfigMap's data.
                          type: string
                        name:
                          description: this field is used to specify the name of the
                            variable which can be used in the BMC settings with {{
                            <variable Name> }} syntax
                          maxLength: 256
                          minLength: 1
                          type: string
                        objectIdentifier:
                          description: |-
                            ObjectName is used to specify the identifier of the object which contains the value of the variable.
                            For example, if the variable is supposed to get its value from a Secret object, this field along with ObjectKind can be used to identify the Secret in 'ObjectKeyRefs' and fetch the value of the variable from the Secret's data using the key specified in 'Key' field.
                            This is not needed for the Type "labels" as the value can be fetched directly from the labels of the BMC.
                          type: string
                        regexReplaces:
                          description: RegexReplace defines regex replacement rules
                            applied to the resolved variable.
                          properties:
                            pattern:
                              description: Pattern is the regular expression to match
                                against the variable value.
                              type: string
                            replacement:
                              description: Replacement is the string to replace the
                                matched pattern with.
                              type: string
                          required:
                          - pattern
                          - replacement
                          type: object
                        type:
                          description: |-
                            ObjectKind specifies the type of the Object, which determines where the controller should look for the value of the variable.
                            example: if ObjectKind is "ConfigMap", 'ObjectName' along ObjectKind  is used to identify the object in 'ObjectKeyRefs' and fetch ConfigMap and use the value of the 'key' specified in Key to fetch the value of the required variable.
                            In case of "labels" data for variable is fetched directly from the labels of the BMC.
                          enum:
                          - ConfigMap
                          - labels
                          - Secret
                          type: string
                      required:
                      - key
                      - name
                      - type
                      type: object
                    type: array
                type: object
            required:
            - bmcSelector
            - bmcSettingsTemplate
            type: object
          status:
            description: BMCSettingsSetStatus defines the observed state of BMCSettingsSet.
            properties:
              availableBMCSettings:
                description: AvailableBMCSettings is the number of BMCSettings currently
                  created by the set.
                format: int32
                type: integer
              completedBMCSettings:
                description: CompletedBMCSettings is the total number of completed
                  BMCSettings in the set.
                format: int32
                type: integer
              failedBMCSettings:
                description: FailedBMCSettings is the total number of failed BMCSettings
                  in the set.
                format: int32
                type: integer
              fullyLabeledBMCs:
                description: FullyLabeledBMCs is the number of BMCs in the set.
                format: int32
                type: integer
              inProgressBMCSettings:
                description: InProgressBMCSettings is the total number of BMCSettings
                  in the set that are currently in progress.
                format: int32
                type: integer
              pendingBMCSettings:
                description: PendingBMCSettings is the total number of pending BMCSettings
                  in the set.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
