                                  rule: '(has(self.fieldRef) ? 1 : 0) + (has(self.configMapKeyRef)
                                    ? 1 : 0) + (has(self.secretKeyRef) ? 1 : 0) +
                                    (has(self.ownedByRef) ? 1 : 0) == 1'
