#
# MaintenancePipelineRun — auto-generated by the MaintenancePipeline controller.
#
# !! DO NOT AUTHOR THIS MANUALLY !!
# The controller creates one Run per unique BMC matched by the pipeline's serverSelector.
# This file exists as a reference/documentation sample only.
#
# Name: generated via generateName (pipeline-name + random suffix).
# The controller never constructs deterministic names; it locates existing Runs
# via label selectors (metal.ironcore.dev/pipeline + metal.ironcore.dev/bmc).
#
# This sample represents the Run for bmc-abc123, which is shared by three servers
# (server-a, server-b, server-c), mid-way through the pipeline:
#   - Stage 1 (bmc-baseline):   Completed
#   - Stage 2 (bmc-fw-v160):    Completed  (driftPolicy: Suspend — intermediate hop)
#   - Stage 3 (bmc-fw-v170):    InProgress — BMCVersion child currently upgrading to v1.70
#   - Stages 4–9:               Pending
#
apiVersion: metal.ironcore.dev/v1alpha1
kind: MaintenancePipelineRun
metadata:
  # Generated name — never stable. Use labels to find runs for a specific pipeline/BMC.
  name: ilo6-upgrade-to-v180-x7k9f
  labels:
    # Used by the pipeline controller to list only its own runs.
    metal.ironcore.dev/pipeline: ilo6-upgrade-to-v180
    # Used to find the Run for a specific BMC without a full list scan.
    metal.ironcore.dev/bmc: bmc-abc123
  # OwnerReference to the pipeline ensures garbage collection when the pipeline is deleted.
  ownerReferences:
    - apiVersion: metal.ironcore.dev/v1alpha1
      kind: MaintenancePipeline
      name: ilo6-upgrade-to-v180
      uid: <pipeline-uid>           # filled by the controller
      controller: true
      blockOwnerDeletion: true
spec:
  # The BMC this Run manages. Immutable after creation.
  bmcRef:
    name: bmc-abc123

  # All servers that share this BMC AND are matched by the pipeline's serverSelector.
  # The controller keeps this list in sync: if a server is added to or removed from
  # the selection, it is added/removed here and the relevant Server-scoped children
  # are created/deleted accordingly.
  serverRefs:
    - name: server-a
    - name: server-b
    - name: server-c

# Status is written exclusively by the Run controller — never author this section.
status:
  # Aggregate phase of this Run.
  # Pending     → created but not yet the active slot (maxConcurrent gate)
  # InProgress  → at least one stage is executing
  # Completed   → every stage reached Completed
  # Failed      → at least one stage Failed and no retries remain
  phase: InProgress

  # Stage-count summary (shown in `kubectl get mpr` columns).
  totalStages: 9
  pendingStages: 6
  activeStages: 1
  completedStages: 2
  failedStages: 0

  stages:
    # ─────────────────────────────────────────────────────────────────────────
    # Stage 1: bmc-baseline — Completed
    # ─────────────────────────────────────────────────────────────────────────
    # Run created BMCSettings/bmc-baseline-p4m2q, waited for BMCSettingsState=Applied,
    # then patched driftPolicy=Observe on the child (settings stages always get Observe).
    - name: bmc-baseline
      phase: Completed
      childRef:
        kind: BMCSettings
        name: bmc-baseline-p4m2q
      completedAt: "2026-05-01T10:00:00Z"

    # ─────────────────────────────────────────────────────────────────────────
    # Stage 2: bmc-fw-v160 — Completed (intermediate hop → driftPolicy: Suspend)
    # ─────────────────────────────────────────────────────────────────────────
    # BMCVersion child reached Completed. Since a later BMCVersion stage exists
    # (bmc-fw-v170), the Run patched driftPolicy=Suspend on this child before
    # advancing — hardware is expected to be ahead of v1.60, so drift detection
    # would produce false positives.
    - name: bmc-fw-v160
      phase: Completed
      childRef:
        kind: BMCVersion
        name: bmc-fw-v160-n8rt3
      completedAt: "2026-05-01T10:15:00Z"

    # ─────────────────────────────────────────────────────────────────────────
    # Stage 3: bmc-fw-v170 — InProgress
    # ─────────────────────────────────────────────────────────────────────────
    # BMCVersion child is currently upgrading the BMC from v1.60 to v1.70.
    - name: bmc-fw-v170
      phase: InProgress
      childRef:
        kind: BMCVersion
        name: bmc-fw-v170-m3kx9

    # ─────────────────────────────────────────────────────────────────────────
    # Stages 4–9: Pending (blocked by stage 3)
    # ─────────────────────────────────────────────────────────────────────────
    # No child resources have been created for these stages yet.

    - name: bmc-fw-v180
      phase: Pending
      # childRef absent — no child created yet

    - name: bmc-post-upgrade
      phase: Pending

    # Server-scoped stages list per-server sub-status even in Pending,
    # so observers can see which servers are targeted before work begins.
    - name: bios-pre-upgrade
      phase: Pending
      servers:
        - serverRef:
            name: server-a
          phase: Pending
        - serverRef:
            name: server-b
          phase: Pending
        - serverRef:
            name: server-c
          phase: Pending

    - name: bios-fw-v240
      phase: Pending
      servers:
        - serverRef:
            name: server-a
          phase: Pending
        - serverRef:
            name: server-b
          phase: Pending
        - serverRef:
            name: server-c
          phase: Pending

    - name: bios-fw-v250
      phase: Pending
      servers:
        - serverRef:
            name: server-a
          phase: Pending
        - serverRef:
            name: server-b
          phase: Pending
        - serverRef:
            name: server-c
          phase: Pending

    - name: bios-post-upgrade
      phase: Pending
      servers:
        - serverRef:
            name: server-a
          phase: Pending
        - serverRef:
            name: server-b
          phase: Pending
        - serverRef:
            name: server-c
          phase: Pending

  conditions:
    # Progressing: True while the Run is actively executing stages.
    - type: Progressing
      status: "True"
      reason: StageInProgress
      message: "Stage bmc-fw-v170 is in progress"
      lastTransitionTime: "2026-05-01T10:15:30Z"
