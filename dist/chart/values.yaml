# [MANAGER]: Manager Deployment Configurations
controllerManager:
  enable: true
  replicas: 1
  strategy:
    type: Recreate
  manager:
    image:
      repository: controller
      tag: latest
    args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
    resources:
      limits:
        cpu: 300m
        memory: 200Mi
      requests:
        cpu: 300m
        memory: 50Mi
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10
  serviceAccountName: metal-operator-controller-manager
  hostNetwork: true

registry:
  enabled: false
  port: 30000

# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true

# [CRDs]: To enable the CRDs
crd:
  # This option determines whether the CRDs are included
  # in the installation process.
  enable: true

  # Enabling this option adds the "helm.sh/resource-policy": keep
  # annotation to the CRD, ensuring it remains installed even when
  # the Helm release is uninstalled.
  # NOTE: Removing the CRDs will also remove all cert-manager CR(s)
  # (Certificates, Issuers, ...) due to garbage collection.
  keep: true

# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true

# [WEBHOOKS]: Webhooks configuration
# The following configuration is automatically generated from the manifests
# generated by controller-gen. To update run 'make manifests' and
# the edit command with the '--force' flag
webhook:
  enable: true

# [PROMETHEUS]: To enable a ServiceMonitor to export metrics to Prometheus set true
prometheus:
  enable: false

# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: true

# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# [IGNITION]: Ignition template configuration
# By default, the operator uses a hardcoded ignition template
# Enable this to override the template via ConfigMap
ignition:
  enable: false
  configMapName: "ignition-template"
  configMapKey: "ignition-template.yaml"
  # Template content that can be customized - this will be injected into the ConfigMap
  template: |
    variant: fcos
    version: "1.3.0"
    systemd:
      units:
        - name: docker-install.service
          enabled: true
          contents: |-
            [Unit]
            Description=Install Docker
            Before=metalprobe.service
            After=var-lib-docker.mount
            [Service]
            Restart=on-failure
            RestartSec=20
            Type=oneshot
            RemainAfterExit=yes
            ExecStart=/usr/bin/apt-get update
            ExecStart=/usr/bin/apt-get install docker.io docker-cli -y
            [Install]
            WantedBy=multi-user.target
        - name: docker.service
          enabled: true
        - name: metalprobe.service
          enabled: true
          contents: |-
            [Unit]
            Description=Run My Docker Container
            [Service]
            Restart=on-failure
            RestartSec=20
            ExecStartPre=-/usr/bin/docker stop metalprobe
            ExecStartPre=-/usr/bin/docker rm metalprobe
            ExecStartPre=/usr/bin/docker pull {{.Image}}
            ExecStart=/usr/bin/docker run --network host --privileged --name metalprobe {{.Image}} {{.Flags}}
            ExecStop=/usr/bin/docker stop metalprobe
            TimeoutSec=900
            [Install]
            WantedBy=multi-user.target
    storage:
      files: []
    passwd:
      users:
        - name: metal
          password_hash: {{.PasswordHash}}
          groups: [ "wheel" ]
          ssh_authorized_keys: [ {{.SSHPublicKey}} ]
