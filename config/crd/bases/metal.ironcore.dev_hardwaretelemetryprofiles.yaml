---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: hardwaretelemetryprofiles.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: HardwareTelemetryProfile
    listKind: HardwareTelemetryProfileList
    plural: hardwaretelemetryprofiles
    shortNames:
    - htp
    singular: hardwaretelemetryprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.delivery.mode
      name: Mode
      type: string
    - jsonPath: .spec.collectionInterval
      name: Interval
      type: string
    - jsonPath: .status.appliedNodes[*].name
      name: Nodes
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: HardwareTelemetryProfile is the Schema for the HardwareTelemetryProfile
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HardwareTelemetryProfileSpec defines the desired state of
              HardwareTelemetryProfile.
            properties:
              categories:
                description: |-
                  Categories is an optional URI-derived bucket filter. Recognised values: "Temperature", "Fan",
                  "Power", "Voltage", "Current", "Utilization", "Memory", "Network", "Storage".
                  Empty means no category filter applies.
                items:
                  type: string
                type: array
              collectEventLog:
                default: true
                description: |-
                  CollectEventLog controls whether the operator scrapes the BMC's event log (SEL) under Mode=Polling.
                  Default true. Ignored under Mode=EventBased (alerts arrive via the event subscription).
                type: boolean
              collectionInterval:
                default: 30s
                description: |-
                  CollectionInterval is the desired polling cadence (e.g. "30s", "5m").
                  Converted to ISO-8601 at the Redfish call site.
                  Must be between 5s and 24h.
                type: string
              delivery:
                default:
                  mode: Polling
                description: Delivery configures the telemetry delivery mode.
                properties:
                  mode:
                    default: Polling
                    description: Mode is the delivery mode for telemetry data.
                    enum:
                    - Polling
                    - EventBased
                    type: string
                required:
                - mode
                type: object
              metrics:
                description: Metrics is the list of Redfish metrics to collect.
                items:
                  description: |-
                    TelemetryMetric describes a single metric to collect, identified by its Redfish MetricId
                    and further scoped by one or more MetricProperty URIs.
                  properties:
                    metricId:
                      description: MetricId is the exact Redfish MetricId value to
                        match against MetricValue.MetricId.
                      minLength: 1
                      type: string
                    properties:
                      description: Properties is a list of exact Redfish MetricProperty
                        URIs to match.
                      items:
                        type: string
                      minItems: 1
                      type: array
                  required:
                  - metricId
                  - properties
                  type: object
                minItems: 1
                type: array
              nodeSelector:
                description: |-
                  NodeSelector selects BMC objects by label. Only matchLabels is supported;
                  matchExpressions is rejected via CEL validation.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - collectionInterval
            - metrics
            - nodeSelector
            type: object
            x-kubernetes-validations:
            - message: Only matchLabels is supported in HardwareTelemetryProfile NodeSelector
              rule: '!has(self.nodeSelector.matchExpressions) || size(self.nodeSelector.matchExpressions)
                == 0'
            - message: collectionInterval must be at least 5s
              rule: duration(self.collectionInterval).getSeconds() >= 5
            - message: collectionInterval must be at most 24h
              rule: duration(self.collectionInterval).getSeconds() <= 86400
          status:
            description: HardwareTelemetryProfileStatus defines the observed state
              of HardwareTelemetryProfile.
            properties:
              appliedNodes:
                description: AppliedNodes lists the per-BMC status for every node
                  currently matched by this profile.
                items:
                  description: AppliedNodeStatus reports the per-BMC state resulting
                    from HTP reconciliation.
                  properties:
                    lastAppliedAt:
                      description: LastAppliedAt is the time the profile was last
                        successfully applied to this BMC.
                      format: date-time
                      type: string
                    mode:
                      description: Mode is the effective delivery mode for this BMC
                        ("Polling" or "EventBased").
                      type: string
                    mrdActive:
                      description: |-
                        MRDActive is true when the controller has confirmed that the BMC-side
                        MetricReportDefinition is active and pushing data.
                      type: boolean
                    mrdSupported:
                      description: |-
                        MRDSupported is false when the BMC rejected the MRD write or the
                        post-create probe found no data.
                      type: boolean
                    name:
                      description: Name is the name of the BMC object.
                      type: string
                  required:
                  - mode
                  - name
                  type: object
                type: array
              conditions:
                description: Conditions holds the conditions for the HardwareTelemetryProfile.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
