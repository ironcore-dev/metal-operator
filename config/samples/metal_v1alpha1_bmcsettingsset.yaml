apiVersion: metal.ironcore.dev/v1alpha1
kind: BMCSettingsSet
metadata:
  labels:
    app.kubernetes.io/name: metal-operator
    app.kubernetes.io/managed-by: kustomize
  name: bmcsettingsset-sample
spec:
  bmcSelector:
    matchLabels:
      manufacturer: "dell"
      model: "poweredge-r840"
  bmcSettingsTemplate:
    version: "1.45.455b66-rev4"
    serverMaintenancePolicy: Enforced
    settings:
      BootMode: "UEFI"
      HyperThreading: "Enabled"
      LicenseKey: "$(LicenseKey)"
      FQDN: "$(BmcName).$(SearchDomain)"
    variables:
      - key: BmcName
        valueFrom:
          fieldRef:
            fieldPath: spec.bmcRef.name
      - key: SearchDomain
        valueFrom:
          configMapKeyRef:
            name: "bmc-network-config"
            namespace: "metal-system"
            key: "search-domain"
      - key: LicenseKey
        valueFrom:
          secretKeyRef:
            name: "bmc-licenses"
            namespace: "metal-system"
            key: "$(BmcName)"

