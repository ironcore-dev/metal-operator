{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: biossettingssets.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: BIOSSettingsSet
    listKind: BIOSSettingsSetList
    plural: biossettingssets
    shortNames:
    - biosss
    singular: biossettingsset
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.biosSettingsTemplate.version
      name: BIOSVersion
      type: string
    - jsonPath: .status.fullyLabeledServers
      name: TotalServers
      type: string
    - jsonPath: .status.availableBIOSSettings
      name: AvailableBIOSSettings
      type: string
    - jsonPath: .status.pendingBIOSSettings
      name: Pending
      type: string
    - jsonPath: .status.inProgressBIOSSettings
      name: InProgress
      type: string
    - jsonPath: .status.completedBIOSSettings
      name: Completed
      type: string
    - jsonPath: .status.failedBIOSSettings
      name: Failed
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BIOSSettingsSet is the Schema for the biossettingssets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BIOSSettingsSetSpec defines the desired state of BIOSSettingsSet.
            properties:
              biosSettingsTemplate:
                description: BIOSSettingsTemplate defines the template for the BIOSSettings
                  resource to be applied to the servers.
                properties:
                  retryPolicy:
                    description: RetryPolicy defines the retry behavior for automatic
                      retries on transient failures.
                    properties:
                      maxAttempts:
                        description: |-
                          MaxAttempts is the maximum number of automatic retry attempts after failure.
                          0 means no automatic retries. Must be between 0 and 10 inclusive.
                          If not set, the operator-level default is used.
                        format: int32
                        maximum: 10
                        minimum: 0
                        type: integer
                    type: object
                  serverMaintenancePolicy:
                    default: OwnerApproval
                    description: |-
                      ServerMaintenancePolicy is the maintenance policy for server maintenance requests.
                      Defaults to OwnerApproval if not set.
                    type: string
                  settingsFlow:
                    description: |-
                      SettingsFlow contains the ordered settings sequence to apply.
                      Items are applied in ascending Priority order (lower number = higher priority).
                    items:
                      properties:
                        name:
                          description: Name is the name of the flow item.
                          maxLength: 1000
                          minLength: 1
                          type: string
                        priority:
                          description: Priority defines the order of applying the
                            settings. Lower numbers have higher priority (i.e. lower
                            numbers are applied first).
                          format: int32
                          maximum: 2147483645
                          minimum: 1
                          type: integer
                        settings:
                          additionalProperties:
                            type: string
                          description: Settings contains software (e.g. BIOS, BMC)
                            settings as a map.
                          type: object
                      required:
                      - name
                      - priority
                      type: object
                    type: array
                  variables:
                    description: |-
                      Variables is a list of variables for settings templating.
                      Variable references in SettingsFlow items' Settings maps use the $(KEY) syntax.
                      Only applicable to BMCSettings stages; blocked on BIOSSettings by a CEL rule.
                    items:
                      properties:
                        key:
                          description: Key is the name of the variable to be used
                            in the BMCSettingsTemplate format.
                          maxLength: 63
                          minLength: 1
                          type: string
                        valueFrom:
                          description: ValueFrom defines a simple single source for
                            the variable value.
                          properties:
                            configMapKeyRef:
                              description: ConfigMapKeyRef points to a namespaced
                                ConfigMap key.
                              properties:
                                key:
                                  description: Key is the key within the referenced
                                    object.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                name:
                                  description: Name is the referenced object name.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                namespace:
                                  description: Namespace is the referenced object
                                    namespace.
                                  maxLength: 63
                                  minLength: 1
                                  type: string
                              required:
                              - key
                              - name
                              - namespace
                              type: object
                            fieldRef:
                              description: |-
                                FieldRef sources the value from a field of the BMCSettings object (e.g. spec.BMCRef.name).
                                Only string-typed fields are supported; integer, bool, or map fields will cause a resolution error.
                              properties:
                                fieldPath:
                                  description: |-
                                    FieldPath is the path of the field on the BMCSettings object to select (e.g. spec.BMCRef.name).
                                    Only string-typed fields are supported; integer, bool, or map fields will cause a resolution error.
                                  maxLength: 256
                                  minLength: 1
                                  type: string
                              required:
                              - fieldPath
                              type: object
                            secretKeyRef:
                              description: SecretKeyRef points to a namespaced Secret
                                key.
                              properties:
                                key:
                                  description: Key is the key within the referenced
                                    object.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                name:
                                  description: Name is the referenced object name.
                                  maxLength: 253
                                  minLength: 1
                                  type: string
                                namespace:
                                  description: Namespace is the referenced object
                                    namespace.
                                  maxLength: 63
                                  minLength: 1
                                  type: string
                              required:
                              - key
                              - name
                              - namespace
                              type: object
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of fieldRef, configMapKeyRef, or
                              secretKeyRef must be provided
                            rule: '(has(self.fieldRef) ? 1 : 0) + (has(self.configMapKeyRef)
                              ? 1 : 0) + (has(self.secretKeyRef) ? 1 : 0) == 1'
                      required:
                      - key
                      - valueFrom
                      type: object
                    maxItems: 64
                    type: array
                  version:
                    description: |-
                      Version specifies the firmware version.
                      Optional in pipeline stage templates (hydrated at stamp time when omitted);
                      enforced non-empty by CEL rules on the concrete template types.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: version is required
                  rule: self.version != ""
                - message: variables is not supported for BIOSSettings
                  rule: '!has(self.variables)'
                - message: variable keys must be unique
                  rule: '!has(self.variables) || self.variables.all(v, self.variables.filter(w,
                    w.key == v.key).size() == 1)'
              serverSelector:
                description: ServerSelector specifies a label selector to identify
                  the servers that are to be selected.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - serverSelector
            type: object
          status:
            description: BIOSSettingsSetStatus defines the observed state of BIOSSettingsSet.
            properties:
              availableBIOSSettings:
                description: AvailableBIOSSettings is the number of BIOSSettings currently
                  created by the set.
                format: int32
                type: integer
              completedBIOSSettings:
                description: CompletedBIOSSettings is the total number of completed
                  BIOSSettings in the set.
                format: int32
                type: integer
              failedBIOSSettings:
                description: FailedBIOSSettings is the total number of failed BIOSSettings
                  in the set.
                format: int32
                type: integer
              fullyLabeledServers:
                description: FullyLabeledServers is the number of servers in the set.
                format: int32
                type: integer
              inProgressBIOSSettings:
                description: InProgressBIOSSettings is the total number of BIOSSettings
                  in the set that are currently in progress.
                format: int32
                type: integer
              pendingBIOSSettings:
                description: PendingBIOSSettings is the total number of pending BIOSSettings
                  in the set.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
