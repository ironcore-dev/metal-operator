{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: servernetworkconfigs.metal.ironcore.dev
spec:
  group: metal.ironcore.dev
  names:
    kind: ServerNetworkConfig
    listKind: ServerNetworkConfigList
    plural: servernetworkconfigs
    shortNames:
    - snc
    singular: servernetworkconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serverRef.name
      name: ServerRef
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ServerNetworkConfig holds the expected network configuration for a server (written by
          an external source such as argora) and the result of the network check performed by
          metal-operator at the Discovery→Available transition.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ServerNetworkConfigSpec defines the expected network configuration for a server,
              populated by an external source (e.g. argora from NetBox).
            properties:
              interfaces:
                description: Interfaces lists the expected network interfaces.
                items:
                  description: |-
                    ExpectedNetworkInterface defines the expected configuration of a single network interface,
                    derived from an external source such as NetBox.
                  properties:
                    macAddress:
                      description: MACAddress is the expected MAC address of the interface.
                      type: string
                    name:
                      description: Name is the interface name as defined in the external
                        source.
                      type: string
                    port:
                      description: Port is the expected LLDP neighbor port ID on the
                        connected switch.
                      type: string
                    switch:
                      description: Switch is the expected LLDP neighbor system name
                        (i.e. the connected switch).
                      type: string
                  required:
                  - macAddress
                  - name
                  - port
                  - switch
                  type: object
                type: array
              serverRef:
                description: ServerRef references the Server this config applies to.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - serverRef
            type: object
          status:
            description: |-
              ServerNetworkConfigStatus defines the observed state of ServerNetworkConfig,
              written by metal-operator after running the comparison at the Discovery→Available transition.
            properties:
              lastCheckTime:
                description: LastCheckTime is the timestamp of the last check.
                format: date-time
                type: string
              message:
                description: Message provides a human-readable summary of the check
                  result.
                type: string
              mismatches:
                description: Mismatches lists interfaces that did not match the expected
                  configuration.
                items:
                  description: NetworkInterfaceMismatch describes a single interface
                    that did not match expectations.
                  properties:
                    actualPort:
                      description: ActualPort is the port ID observed via LLDP. Empty
                        if the interface was not found.
                      type: string
                    actualSwitch:
                      description: ActualSwitch is the switch name observed via LLDP.
                        Empty if the interface was not found.
                      type: string
                    expectedPort:
                      description: ExpectedPort is the port ID expected from the external
                        source.
                      type: string
                    expectedSwitch:
                      description: ExpectedSwitch is the switch name expected from
                        the external source.
                      type: string
                    macAddress:
                      description: MACAddress is the MAC address used to identify
                        the interface.
                      type: string
                    name:
                      description: Name is the interface name.
                      type: string
                  required:
                  - expectedPort
                  - expectedSwitch
                  - macAddress
                  - name
                  type: object
                type: array
              phase:
                description: Phase is the result of the network check.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
